<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI CLASS PROGRESS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-top">
      <div>
        <h1>AI CLASS PROGRESS</h1>
        <p class="subtitle">TRACK. LOG. DOMINATE.</p>
      </div>
      <div class="theme-switcher" role="group" aria-label="Theme">
        <button class="theme-btn" data-t="dark"  onclick="setTheme('dark')">DARK</button>
        <button class="theme-btn" data-t="luxe"  onclick="setTheme('luxe')">LUXE</button>
        <button class="theme-btn" data-t="fire"  onclick="setTheme('fire')">FIRE</button>
      </div>
    </div>
  </header>

  <main>

    <!-- SESSION LOG -->
    <section class="panel">
      <p class="section-index">01</p>
      <h2>Date &amp; Time Log</h2>

      <div class="form-row">
        <div class="field">
          <label for="s-date">DATE</label>
          <input type="date" id="s-date" />
        </div>
        <div class="field">
          <label for="s-hours">HOURS</label>
          <input type="text" id="s-hours" placeholder="-:--" />
        </div>
        <button onclick="addSession()">+ ADD SESSION</button>
      </div>
      <p id="s-error" class="error hidden">FILL IN ALL FIELDS.</p>

      <div class="table-wrap" style="margin-top:24px">
        <div class="stats">
          <span>SESSIONS: <strong id="s-count">0</strong></span>
          <span>TOTAL HRS: <strong id="s-total">0</strong></span>
        </div>
        <table id="s-table">
          <thead>
            <tr><th>#</th><th>DATE</th><th>HOURS</th><th>DEL</th></tr>
          </thead>
          <tbody id="s-body"></tbody>
        </table>
        <p id="s-empty" class="empty-msg">NO SESSIONS YET.</p>
      </div>
    </section>

    <!-- ITEMS LIST -->
    <section class="panel panel--alt">
      <p class="section-index">02</p>
      <h2>Topics &amp; Items</h2>

      <div class="form-row">
        <div class="field field--wide">
          <label for="i-text">ITEM / TOPIC</label>
          <input type="text" id="i-text" placeholder="e.g. Prompt Engineering" />
        </div>
        <button onclick="addItem()">+ ADD ITEM</button>
      </div>
      <p id="i-error" class="error hidden">ENTER AN ITEM.</p>

      <div style="margin-top:24px">
        <ol id="i-list" class="item-list"></ol>
        <p id="i-empty" class="empty-msg">NO ITEMS YET.</p>
      </div>
    </section>

  </main>

  <!-- DELETE CONFIRMATION MODAL -->
  <div id="confirm-modal" class="confirm-overlay hidden" role="dialog" aria-modal="true">
    <div class="confirm-box">
      <p class="confirm-msg">ARE YOU SURE?</p>
      <div class="confirm-actions">
        <button id="confirm-yes" class="del-btn confirm-yes">YES, DELETE</button>
        <button id="confirm-no">CANCEL</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
